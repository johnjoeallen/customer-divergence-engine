# Flyway configuration for PostgreSQL
flyway.enabled=true
flyway.locations=classpath:db/migration
flyway.baseline-on-migrate=true

# Database connection (should match environment variables)
jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:similarity}
jdbc.user=${DB_USER:similarity}
jdbc.password=${DB_PASSWORD:similarity}
